    <script src="js/shared.js"></script>
    <script>
        function generateTaskRecommendations() {
            const recommendations = document.getElementById('task-recommendations');
            const tasks = [
                { name: '卧室清洁', difficulty: '简单', points: 10, estimatedTime: '15分钟', task: 'bedroom' },
                { name: '客厅整理', difficulty: '中等', points: 20, estimatedTime: '25分钟', task: 'living-room' },
                { name: '厨房清洁', difficulty: '挑战', points: 40, estimatedTime: '40分钟', task: 'kitchen' }
            ];

            recommendations.innerHTML = '';
            tasks.forEach((task, index) => {
                const card = document.createElement('div');
                card.className = 'recommendation-card relative bg-white rounded-xl shadow-md p-4 border-2 border-blue-100';
                card.innerHTML = `
                    <div class="recommendation-badge">${index + 1}</div>
                    <h3 class="font-bold text-lg mb-2">${task.name}</h3>
                    <div class="flex items-center mb-2">
                        <span class="text-sm bg-blue-100 text-blue-800 px-2 py-1 rounded-full">${task.difficulty}</span>
                        <span class="text-sm text-gray-600 ml-2">${task.estimatedTime}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-gray-600">奖励: ${task.points}经验</span>
                        <button class="bg-blue-400 hover:bg-blue-500 text-white px-3 py-1 rounded-lg text-sm transition touch-target start-task-btn" data-task="${task.task}">
                            开始
                        </button>
                    </div>
                `;
                recommendations.appendChild(card);
            });
        }
        
        // 使用事件委托处理动态创建的按钮点击事件
        function setupRecommendationButtons() {
            const recommendationsContainer = document.getElementById('task-recommendations');
            if (recommendationsContainer) {
                recommendationsContainer.addEventListener('click', function(e) {
                    const button = e.target.closest('.start-task-btn');
                    if (button) {
                        const task = button.getAttribute('data-task');
                        if (task) {
                            console.log('点击了推荐任务按钮:', task);
                            navigateTo('task-detail.html', { task });
                        }
                    }
                });
            }
        }

        function setupTaskSelection() {
            document.querySelectorAll('.hero-card').forEach(card => {
                card.addEventListener('click', function() {
                    const task = this.getAttribute('data-task');
                    const difficulty = this.getAttribute('data-difficulty');
                    navigateTo('task-detail.html', { task, difficulty });
                });
            });
        }

        function updateUI() {
            const user = familyMembers.find(m => m.id === currentUser);
            if (user) {
                const levelElement = document.getElementById('level-badge');
                if (levelElement) {
                    levelElement.textContent = `Lv.${user.level}`;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadFromLocalStorage();
            generateTaskRecommendations();
            setupRecommendationButtons();
            setupTaskSelection();
            updateUI();
        });
    </script>
