    <script src="js/shared.js"></script>
    <script>
        const taskNames = {
            'bedroom': '卧室任务',
            'living-room': '客厅任务',
            'bathroom': '卫生间任务',
            'kitchen': '厨房任务',
            'study': '书房任务',
            'balcony': '阳台任务'
        };

        function handleImageUpload(e, type) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const image = document.getElementById(`${type}-image`);
                    const placeholder = document.getElementById(`${type}-placeholder`);
                    image.src = e.target.result;
                    image.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function generateCompare() {
            const beforeImage = document.getElementById('before-image');
            const afterImage = document.getElementById('after-image');
            const compareResult = document.getElementById('compare-result');
            const compareBefore = document.getElementById('compare-before');
            const compareAfter = document.getElementById('compare-after');

            if (beforeImage.src && afterImage.src) {
                compareBefore.style.backgroundImage = `url(${beforeImage.src})`;
                compareAfter.style.backgroundImage = `url(${afterImage.src})`;
                compareResult.classList.remove('hidden');
            } else {
                alert('请上传清洁前后的照片');
            }
        }

        function aiIdentify() {
            const beforeImage = document.getElementById('before-image');
            const afterImage = document.getElementById('after-image');
            const aiResult = document.getElementById('ai-result');

            if (beforeImage.src && afterImage.src) {
                setTimeout(() => {
                    aiResult.classList.remove('hidden');
                    
                    const score = 98; // 模拟AI评分
                    const task = getURLParameter('task');
                    
                    // 更新最佳照片
                    if (task && afterImage.src) {
                        updateBestPhoto(task, afterImage.src, score);
                    }
                    
                    const userIndex = familyMembers.findIndex(m => m.id === currentUser);
                    if (userIndex !== -1) {
                        const user = familyMembers[userIndex];
                        user.experience += 100;
                        
                        if (user.experience >= 100) {
                            user.level += 1;
                            user.experience -= 100;
                            showLevelUpAnimation();
                        }
                        
                        saveToLocalStorage();
                    }
                }, 1000);
            } else {
                alert('请上传清洁前后的照片');
            }
        }

        function saveLayout() {
            const roomType = document.getElementById('room-type').value;
            const roomSize = document.getElementById('room-size').value;
            const items = [];

            document.querySelectorAll('input[type="checkbox"]:checked').forEach(checkbox => {
                items.push(checkbox.id.replace('item-', ''));
            });

            const layout = {
                roomType,
                roomSize,
                items
            };

            localStorage.setItem('roomLayout', JSON.stringify(layout));
            alert('布局配置已保存');
        }

        function loadDemoImages() {
            const beforeImage = document.getElementById('before-image');
            const afterImage = document.getElementById('after-image');
            const beforePlaceholder = document.getElementById('before-placeholder');
            const afterPlaceholder = document.getElementById('after-placeholder');

            beforeImage.classList.add('hidden');
            afterImage.classList.add('hidden');
            beforePlaceholder.classList.remove('hidden');
            afterPlaceholder.classList.remove('hidden');

            beforePlaceholder.innerHTML = `
                <div class="before-clean w-full h-full rounded-lg"></div>
            `;

            afterPlaceholder.innerHTML = `
                <div class="after-clean w-full h-full rounded-lg"></div>
            `;
        }

        function resetDemo() {
            const beforeImage = document.getElementById('before-image');
            const afterImage = document.getElementById('after-image');
            const beforePlaceholder = document.getElementById('before-placeholder');
            const afterPlaceholder = document.getElementById('after-placeholder');

            beforeImage.src = '';
            afterImage.src = '';
            beforeImage.classList.add('hidden');
            afterImage.classList.add('hidden');
            beforePlaceholder.classList.remove('hidden');
            afterPlaceholder.classList.remove('hidden');

            beforePlaceholder.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 md:h-12 md:w-12 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="text-sm md:text-base">点击上传照片</p>
            `;

            afterPlaceholder.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 md:h-12 md:w-12 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="text-sm md:text-base">点击上传照片</p>
            `;
        }

        function updateTaskTitle() {
            const task = getURLParameter('task');
            if (task && taskNames[task]) {
                document.getElementById('task-title').textContent = taskNames[task];
                document.getElementById('room-type').value = task;
            }
        }
        
        function loadBestPhoto() {
            const task = getURLParameter('task');
            if (task && roomBestPhotos[task]) {
                const bestPhoto = roomBestPhotos[task];
                const bestImage = document.getElementById('best-image');
                const bestPlaceholder = document.getElementById('best-placeholder');
                const bestPhotoInfo = document.getElementById('best-photo-info');
                
                bestImage.src = bestPhoto.url;
                bestImage.classList.remove('hidden');
                bestPlaceholder.classList.add('hidden');
                bestPhotoInfo.textContent = `最佳清洁效果 (${bestPhoto.date}) - 评分: ${bestPhoto.score}分`;
            }
        }
        
        function updateBestPhoto(roomType, photoUrl, score) {
            const currentDate = new Date().toISOString().split('T')[0];
            
            if (!roomBestPhotos[roomType] || score > roomBestPhotos[roomType].score) {
                roomBestPhotos[roomType] = {
                    url: photoUrl,
                    score: score,
                    date: currentDate
                };
                saveToLocalStorage();
                loadBestPhoto();
            }
        }

        function setupEventListeners() {
            document.getElementById('before-upload').addEventListener('change', function(e) {
                handleImageUpload(e, 'before');
            });

            document.getElementById('after-upload').addEventListener('change', function(e) {
                handleImageUpload(e, 'after');
            });

            document.getElementById('generate-compare').addEventListener('click', generateCompare);
            document.getElementById('ai-identify').addEventListener('click', aiIdentify);
            document.getElementById('save-layout').addEventListener('click', saveLayout);
            document.getElementById('load-demo').addEventListener('click', loadDemoImages);
            document.getElementById('reset-demo').addEventListener('click', resetDemo);
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadFromLocalStorage();
            updateTaskTitle();
            loadBestPhoto();
            setupEventListeners();
        });
    </script>
</body>
</html>
